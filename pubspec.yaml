name: presunivgo
description: "PresUnivGo — Exclusive Professional Networking Platform for President University"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0
  firebase_remote_config: ^5.0.0
  firebase_app_check: ^0.3.0
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^13.0.0

  # UI & Design
  google_fonts: ^6.2.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  image_picker: ^1.1.0
  image_cropper: ^7.0.0
  flutter_svg: ^2.0.0
  lottie: ^3.1.0
  fl_chart: ^0.68.0
  smooth_page_indicator: ^1.1.0

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.0
  flutter_cache_manager: ^3.3.0

  # Network & API
  dio: ^5.5.0
  connectivity_plus: ^6.0.0
  http: ^1.2.0

  # Files & Media
  file_picker: ^8.0.0
  pdf: ^3.11.0
  printing: ^5.11.0
  flutter_pdfview: ^1.3.0
  video_player: ^2.9.0
  record: ^5.1.0

  # Utils
  intl: ^0.20.2
  timeago: ^3.6.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  permission_handler: ^11.3.0
  local_auth: ^2.2.0
  crypto: ^3.0.0
  mime: ^1.0.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  mocktail: ^1.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/logo.png

